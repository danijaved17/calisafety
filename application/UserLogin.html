<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CaliSafety</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header id="header">
    <script type="text/javascript" src="NavBar.js"></script>
</header>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Login</h2>
        <p class="subtitle">Don't have an account? <a href="register.html">Register here</a>. You can also <a href="index.html">use the app without logging in</a>.</p>

        <form>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input id="email" name="email" required type="email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" required type="password" placeholder="••••••••">
            </div>
            <button type="button" id="login-button" class="btn btn-primary">Login</button>
        </form>

        <p class="error-msg" id="error-message"></p>
    </div>
</div>

<script type="text/javascript" src="login.js"></script>

<footer>
    <p><a href="https://www.oag.ca.gov/privacy/ccpa" target="_blank">California Consumer Privacy Act (CCPA)</a></p>
</footer>
</body>
</html>
